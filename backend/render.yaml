services:
  - type: web
    name: sortmyprep-leads-backend
    runtime: python
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn app:app
    envVars:
      - key: GROQ_API_KEY
        sync: false       # set manually in Render dashboard
      - key: MONGO_URI
        sync: false       # set manually in Render dashboard
